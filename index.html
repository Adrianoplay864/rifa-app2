<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Rifa Plan San Andrés</title>

    <style>
      body {
        font-family: Arial;
        background: #f4f6f9;
        text-align: center;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(60px, 1fr));
        gap: 8px;
        max-height: 70vh;
        overflow: auto;
      }

      .numero {
        padding: 10px;
        background: white;
        border: 1px solid #ddd;
        cursor: pointer;
      }

      .pago {
        background: #27ae60;
        color: white;
      }
      .pendente {
        background: #f39c12;
        color: white;
      }

      .modal {
        display: none;
        position: fixed;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
      }

      .modal-content {
        background: white;
        padding: 20px;
        margin: 20% auto;
        max-width: 300px;
      }

      button {
        width: 100%;
        margin: 5px;
        padding: 10px;
      }
    </style>
  </head>
  <body>
    <h1>Rifa Plan San Andrés</h1>
    <p>Sorteo: 06 de mayo - Lotería del Meta</p>
    <p>Premio: Viaje para 2 personas todo incluido</p>
    <p><b>Valor: $50.000 COP</b></p>

    <div class="grid" id="rifa"></div>

    <div class="modal" id="modal">
      <div class="modal-content">
        <h3 id="num"></h3>

        <input id="nome" placeholder="Nombre" />
        <input id="tel" placeholder="Teléfono" />
        <input id="valor" type="number" placeholder="Pago" />

        <p id="info"></p>

        <button onclick="guardar()">Guardar</button>
        <button onclick="cerrar()">Cerrar</button>
      </div>
    </div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
      import {
        getFirestore,
        doc,
        setDoc,
        getDocs,
        collection,
      } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

      // 🔥 SUA CONFIG (já inserida)
      const firebaseConfig = {
        apiKey: "AIzaSyCVpd_OrRd1vf-RpZip8tAmxy1AyQOzmPg",
        authDomain: "rifa-san-andres.firebaseapp.com",
        projectId: "rifa-san-andres",
        storageBucket: "rifa-san-andres.firebasestorage.app",
        messagingSenderId: "43434845716",
        appId: "1:43434845716:web:ee8cb0e8ad3bd943f76901",
      };

      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);

      const VALOR_TOTAL = 50000;

      let dados = {};
      let numeroAtual = null;

      const rifa = document.getElementById("rifa");

      // CRIAR NUMEROS
      for (let i = 0; i <= 999; i++) {
        let div = document.createElement("div");
        div.textContent = String(i).padStart(3, "0");
        div.classList.add("numero");

        div.onclick = () => abrir(div.textContent);
        rifa.appendChild(div);
      }

      // CARREGAR DADOS DO FIREBASE
      async function carregar() {
        const querySnapshot = await getDocs(collection(db, "rifa"));

        querySnapshot.forEach((docSnap) => {
          dados[docSnap.id] = docSnap.data();
        });

        atualizarTela();
      }

      function atualizarTela() {
        document.querySelectorAll(".numero").forEach((n) => {
          let d = dados[n.textContent];
          n.classList.remove("pago", "pendente");

          if (d) {
            n.classList.add(d.estado);
          }
        });
      }

      function abrir(num) {
        numeroAtual = num;
        document.getElementById("modal").style.display = "block";

        let d = dados[num] || {};

        document.getElementById("num").innerText = "Número " + num;
        document.getElementById("nome").value = d.nome || "";
        document.getElementById("tel").value = d.tel || "";
        document.getElementById("valor").value = "";

        atualizarInfo();
      }

      function atualizarInfo() {
        let total = dados[numeroAtual]?.valor || 0;
        let falta = VALOR_TOTAL - total;

        document.getElementById("info").innerText =
          "Pagado: $" + total + " | Falta: $" + (falta > 0 ? falta : 0);
      }

      async function guardar() {
        let nome = document.getElementById("nome").value;
        let tel = document.getElementById("tel").value;
        let valorNovo = parseInt(document.getElementById("valor").value) || 0;

        let antigo = dados[numeroAtual] || {};
        let total = (antigo.valor || 0) + valorNovo;

        let estado = total >= VALOR_TOTAL ? "pago" : "pendente";

        let novo = { nome, tel, valor: total, estado };

        await setDoc(doc(db, "rifa", numeroAtual), novo);

        dados[numeroAtual] = novo;

        atualizarTela();
        cerrar();
      }

      function cerrar() {
        document.getElementById("modal").style.display = "none";
      }

      // iniciar
      carregar();
    </script>
  </body>
</html>
